<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TeachMeBack — Login</title>
    <style>
      :root{
        --bg:#f6f9fc; --card:#ffffff; --muted:#6b7280; --accent1:#5b8cff; --accent2:#7b61ff; --danger:#ef4444; --warn:#f59e0b; --ok:#10b981;
      }
      *{box-sizing:border-box}
      body{font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef2ff 0%, #f8fafc 60%);margin:0;color:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
      .auth-card{background:var(--card);border-radius:16px;box-shadow:0 10px 40px rgba(15,23,42,0.1);padding:40px;width:100%;max-width:420px}
      .auth-card h2{text-align:center;font-size:24px;margin-bottom:8px}
      .auth-card .subtitle{text-align:center;margin-bottom:24px}
      .form-group{margin-bottom:16px}
      .form-group label{display:block;margin-bottom:6px;font-weight:500;font-size:14px;color:#374151}
      .form-group input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #e5e7eb;font-size:15px;transition:border-color 0.2s}
      .form-group input:focus{outline:none;border-color:var(--accent1);box-shadow:0 0 0 3px rgba(91,140,255,0.1)}
      .auth-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:white;font-weight:600;font-size:16px;cursor:pointer;transition:opacity 0.2s}
      .auth-btn:hover{opacity:0.9}
      .auth-btn:disabled{opacity:0.6;cursor:not-allowed}
      .auth-switch{text-align:center;margin-top:16px;font-size:14px;color:var(--muted)}
      .auth-switch a{color:var(--accent1);text-decoration:none;font-weight:500;cursor:pointer}
      .auth-switch a:hover{text-decoration:underline}
      .auth-error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;display:none}
      .auth-error.show{display:block}
      .logo{margin:0 auto 16px;width:56px;height:56px;border-radius:10px;background:linear-gradient(90deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:white}
      .or-divider{text-align:center;margin:20px 0;color:#6b7280;font-size:14px}
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="logo">📚</div>
      <h2 id="authTitle">Welcome Back</h2>
      <p class="subtitle" id="authSubtitle">Sign in to continue learning</p>

      <div class="auth-error" id="authError"></div>

      <div id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email or Phone</label>
          <input type="text" id="loginEmail" placeholder="Enter your email or phone" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <button class="auth-btn" onclick="handleLogin()">Sign In</button>
        <div class="auth-switch">
          Don't have an account? <a onclick="showRegister()">Sign up</a>
        </div>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input type="text" id="registerName" placeholder="Enter your name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="registerPhone">Phone (optional)</label>
          <input type="tel" id="registerPhone" placeholder="Enter your phone number" autocomplete="tel" />
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="adminCode">Admin Code (optional)</label>
          <input type="text" id="adminCode" placeholder="Enter admin code if you have one" />
        </div>
        <button class="auth-btn" onclick="handleRegister()">Create Account</button>
        <div class="auth-switch">
          Already have an account? <a onclick="showLogin()">Sign in</a>
        </div>
      </div>

      <div class="or-divider">or</div>

      <div id="googleSignInBtn"></div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      const API = window.location.hostname === 'localhost'
        ? 'http://localhost:8000/api'
        : 'https://teachmebackai-oifm.onrender.com/api'

      async function initGoogleSignIn() {
        try {
          const res = await fetch(API + '/google-client-id')
          const data = await res.json()
          if (res.ok && data.client_id) {
            window.addEventListener('load', () => {
              if (window.google && window.google.accounts) {
                window.google.accounts.id.initialize({
                  client_id: data.client_id,
                  callback: handleGoogleSignIn
                })
                window.google.accounts.id.renderButton(
                  document.getElementById('googleSignInBtn'),
                  {
                    theme: 'outline',
                    size: 'large',
                    text: 'continue_with',
                    shape: 'rectangular',
                    width: 300
                  }
                )
              }
            })
          }
        } catch (e) {
          console.log('Failed to fetch Google Client ID:', e)
        }
      }

      async function handleGoogleSignIn(response) {
        try {
          const res = await fetch(API + '/google-signin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential: response.credential })
          })

          const data = await res.json()

          if (res.ok) {
            localStorage.setItem('authToken', data.token)
            localStorage.setItem('userName', data.name)
            localStorage.setItem('userId', data.id)
            window.location.href = 'app.html'
          } else {
            showAuthError(data.detail || 'Google sign-in failed')
          }
        } catch (e) {
          showAuthError('Cannot connect to server')
        }
      }

      function showLogin() {
        document.getElementById('loginForm').style.display = 'block'
        document.getElementById('registerForm').style.display = 'none'
        document.getElementById('authTitle').textContent = 'Welcome Back'
        document.getElementById('authSubtitle').textContent = 'Sign in to continue learning'
        hideAuthError()
      }

      function showRegister() {
        document.getElementById('loginForm').style.display = 'none'
        document.getElementById('registerForm').style.display = 'block'
        document.getElementById('authTitle').textContent = 'Create Account'
        document.getElementById('authSubtitle').textContent = 'Sign up to start learning'
        hideAuthError()
      }

      function showAuthError(message) {
        const errorEl = document.getElementById('authError')
        errorEl.textContent = message
        errorEl.classList.add('show')
      }

      function hideAuthError() {
        document.getElementById('authError').classList.remove('show')
      }

      async function handleLogin() {
        const emailOrPhone = document.getElementById('loginEmail').value.trim()
        const password = document.getElementById('loginPassword').value

        if (!emailOrPhone || !password) {
          showAuthError('Please fill in all fields')
          return
        }

        const loginBtn = document.querySelector('#loginForm .auth-btn')
        loginBtn.textContent = 'Signing in...'
        loginBtn.disabled = true

        try {
          const res = await fetch(API + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email_or_phone: emailOrPhone, password })
          })

          const data = await res.json()

          if (res.ok) {
            localStorage.setItem('authToken', data.token)
            localStorage.setItem('userName', data.name)
            localStorage.setItem('userId', data.id)
            window.location.href = 'app.html'
          } else {
            showAuthError(data.detail || 'Login failed')
          }
        } catch (e) {
          showAuthError('Cannot connect to server')
        } finally {
          loginBtn.textContent = 'Sign In'
          loginBtn.disabled = false
        }
      }

      async function handleRegister() {
        const name = document.getElementById('registerName').value.trim()
        const email = document.getElementById('registerEmail').value.trim()
        const phone = document.getElementById('registerPhone').value.trim()
        const password = document.getElementById('registerPassword').value
        const adminCode = document.getElementById('adminCode').value.trim()

        if (!name || !email || !password) {
          showAuthError('Name, email, and password are required')
          return
        }

        if (password.length < 6) {
          showAuthError('Password must be at least 6 characters')
          return
        }

        const registerBtn = document.querySelector('#registerForm .auth-btn')
        registerBtn.textContent = 'Creating account...'
        registerBtn.disabled = true

        try {
          const res = await fetch(API + '/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, phone, password, admin_code: adminCode || undefined })
          })

          const data = await res.json()

          if (res.ok) {
            localStorage.setItem('authToken', data.token)
            localStorage.setItem('userName', data.name)
            localStorage.setItem('userId', data.id)
            window.location.href = 'app.html'
          } else {
            showAuthError(data.detail || 'Registration failed')
          }
        } catch (e) {
          showAuthError('Cannot connect to server')
        } finally {
          registerBtn.textContent = 'Create Account'
          registerBtn.disabled = false
        }
      }

      // Check if already logged in
      if (localStorage.getItem('authToken')) {
        window.location.href = 'app.html'
      }

      initGoogleSignIn()
    </script>
  </body>
</html>
